<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krónu Smellir</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Press Start 2P', monospace;
  background: #0f0e2e;
  color: #e0e0e0;
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
}

/* ── Header ── */
#header {
  background: #1a1a4e;
  border-bottom: 4px solid #ffd700;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
#header h1 { font-size: 18px; color: #ffd700; }
#balance-display { font-size: 16px; color: #fff; }
#stats-display { font-size: 9px; color: #aaa; margin-top: 4px; }

/* ── Main area ── */
#game {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px 16px;
}

/* ── Coin ── */
#coin-area {
  position: relative;
  margin-bottom: 24px;
}

#coin {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ffe066, #ffd700 40%, #c8a600 100%);
  border: 6px solid #b8960a;
  box-shadow:
    0 0 0 4px #0f0e2e,
    0 0 0 8px #ffd700,
    inset 0 -4px 0 rgba(0,0,0,0.2),
    0 8px 0 #8a6e00,
    0 12px 20px rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  flex-direction: column;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
#coin:active { transform: scale(0.92) translateY(4px); box-shadow:
    0 0 0 4px #0f0e2e,
    0 0 0 8px #ffd700,
    inset 0 -2px 0 rgba(0,0,0,0.2),
    0 2px 0 #8a6e00,
    0 4px 10px rgba(0,0,0,0.5);
}

/* Paper money style */
#coin.paper {
  width: 220px;
  height: 120px;
  border-radius: 8px;
  border: 4px solid #2a6e3a;
  box-shadow:
    0 0 0 3px #0f0e2e,
    0 0 0 6px #4a4,
    inset 0 -3px 0 rgba(0,0,0,0.15),
    0 6px 0 #1a4e2a,
    0 10px 20px rgba(0,0,0,0.5);
}
#coin.paper.bill-500 {
  background: linear-gradient(135deg, #3a8a5a, #2e7a4e 30%, #266840 60%, #1e5a34);
}
#coin.paper.bill-1000 {
  background: linear-gradient(135deg, #5a5aa0, #4a4a8e 30%, #3a3a7e 60%, #2e2e6e);
}
#coin.paper.bill-5000 {
  background: linear-gradient(135deg, #8a5a3a, #7a4e30 30%, #6a4028 60%, #5a3420);
}
#coin.paper.bill-10000 {
  background: linear-gradient(135deg, #8a3a5a, #7a2e4e 30%, #6a2440 60%, #5a1a34);
}
#coin.paper:active { transform: scale(0.94) translateY(3px); box-shadow:
    0 0 0 3px #0f0e2e,
    0 0 0 6px #4a4,
    inset 0 -1px 0 rgba(0,0,0,0.15),
    0 2px 0 #1a4e2a,
    0 4px 10px rgba(0,0,0,0.5);
}

/* Silver coin variant */
#coin.silver {
  background: radial-gradient(circle at 35% 35%, #f0f0f0, #c0c0c0 40%, #888 100%);
  border-color: #777;
  box-shadow:
    0 0 0 4px #0f0e2e,
    0 0 0 8px #aaa,
    inset 0 -4px 0 rgba(0,0,0,0.2),
    0 8px 0 #555,
    0 12px 20px rgba(0,0,0,0.5);
}
#coin.silver:active { box-shadow:
    0 0 0 4px #0f0e2e,
    0 0 0 8px #aaa,
    inset 0 -2px 0 rgba(0,0,0,0.2),
    0 2px 0 #555,
    0 4px 10px rgba(0,0,0,0.5);
}

#coin-icon {
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: -16px;
}
#coin-icon svg {
  width: 100%;
  height: 100%;
}
#coin.silver #coin-icon { color: #8a8a8a; }
#coin:not(.silver):not(.paper) #coin-icon { color: #8a6e00; }
#coin.paper #coin-icon { color: rgba(255,255,255,0.25); }

#coin-value {
  font-family: 'Press Start 2P', monospace;
  font-size: 28px;
  color: #5c4500;
  text-shadow: 1px 1px 0 #ffe680;
  pointer-events: none;
}
#coin.silver #coin-value {
  color: #333;
  text-shadow: 1px 1px 0 #ddd;
}
#coin.paper #coin-value {
  color: #e0e0e0;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
}
#coin-label {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: #7a6000;
  margin-top: 4px;
  pointer-events: none;
}
#coin.silver #coin-label {
  color: #444;
}
#coin.paper #coin-label {
  color: #c0c0c0;
}

#click-info {
  font-size: 10px;
  color: #aaa;
  text-align: center;
  margin-top: 8px;
  margin-bottom: 40px;
}

/* ── Floating text ── */
.float-text {
  position: absolute;
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: #ffd700;
  pointer-events: none;
  animation: floatUp 1s ease-out forwards;
  text-shadow: 1px 1px 0 #000;
  z-index: 100;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
}

/* ── Upgrade panels ── */
#upgrades {
  display: flex;
  gap: 16px;
  width: 100%;
  max-width: 1200px;
  flex-wrap: wrap;
  justify-content: center;
}

.panel {
  background: #1a1a4e;
  border: 4px solid #333380;
  flex: 1;
  min-width: 250px;
  max-width: 400px;
}

.panel-title {
  background: #2a2a6e;
  padding: 10px 12px;
  font-size: 10px;
  color: #ffd700;
  border-bottom: 4px solid #333380;
}

.panel-body { padding: 12px; }

/* ── Coin upgrade section ── */
#coin-upgrade-info {
  font-size: 9px;
  line-height: 2;
  margin-bottom: 12px;
}
#coin-upgrade-info span { color: #ffd700; }

/* ── Buttons ── */
.btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 10px 16px;
  border: 4px solid;
  cursor: pointer;
  transition: transform 0.05s;
  width: 100%;
  text-align: left;
}
.btn:active { transform: scale(0.96); }

.btn-upgrade {
  background: #2a6e2a;
  border-color: #4a4;
  color: #cfc;
}
.btn-upgrade:hover { background: #3a8e3a; }
.btn-upgrade.disabled {
  background: #333;
  border-color: #555;
  color: #666;
  cursor: not-allowed;
}
.btn-upgrade.maxed {
  background: #6e6e2a;
  border-color: #aa4;
  color: #ffd700;
  cursor: default;
}

/* ── Generator list ── */
.gen-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.gen-info {
  font-size: 8px;
  line-height: 1.8;
  flex: 1;
}
.gen-name { color: #ffd700; }
.gen-desc { color: #888; font-size: 7px; }
.gen-owned { color: #8f8; }
.gen-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  padding: 8px 10px;
  border: 3px solid #4a4;
  background: #2a6e2a;
  color: #cfc;
  cursor: pointer;
  white-space: nowrap;
  min-width: 90px;
  text-align: center;
}
.gen-btn:hover { background: #3a8e3a; }
.gen-btn:active { transform: scale(0.96); }
.gen-btn.disabled {
  background: #333;
  border-color: #555;
  color: #666;
  cursor: not-allowed;
}

/* ── Rebirth panel ── */
#rebirth-panel {
  background: #2e1a1a;
  border: 4px solid #ff4444;
  flex: 0 1 200px;
  min-width: 180px;
  max-width: 220px;
}
#rebirth-panel .panel-title {
  background: #4e1a1a;
  color: #ff6666;
  border-bottom: 4px solid #ff4444;
}
#rebirth-info {
  font-size: 9px;
  line-height: 2.2;
  margin-bottom: 12px;
}
#rebirth-info span { color: #ff6666; }
#rebirth-kr-display {
  color: #ff6666;
  font-size: 11px;
  margin-bottom: 8px;
}
.btn-rebirth {
  background: #6e1a1a;
  border-color: #ff4444;
  color: #fcc;
}
.btn-rebirth:hover { background: #8e2a2a; }
.btn-rebirth.disabled {
  background: #333;
  border-color: #555;
  color: #666;
  cursor: not-allowed;
}


/* ── Reset button ── */
#reset-btn {
  position: fixed;
  bottom: 10px;
  right: 10px;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  padding: 6px 10px;
  background: #333;
  border: 2px solid #555;
  color: #888;
  cursor: pointer;
  z-index: 50;
}
#reset-btn:hover { background: #522; border-color: #a44; color: #f88; }

/* ── Offline banner ── */
#offline-banner {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #1a1a4e;
  border: 6px solid #ffd700;
  padding: 32px;
  z-index: 999;
  text-align: center;
  max-width: 360px;
}
#offline-banner h2 { font-size: 12px; color: #ffd700; margin-bottom: 16px; }
#offline-banner p { font-size: 9px; line-height: 2; margin-bottom: 16px; }
#offline-banner button {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 12px 24px;
  background: #2a6e2a;
  border: 4px solid #4a4;
  color: #cfc;
  cursor: pointer;
}
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 998;
}
/* ── Leaderboard button ── */
#lb-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  padding: 8px 12px;
  background: #2a2a6e;
  border: 3px solid #5555cc;
  color: #aaf;
  cursor: pointer;
}
#lb-btn:hover { background: #3a3a8e; }

/* ── Leaderboard modal ── */
#lb-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
}
#lb-modal {
  display: none;
  position: fixed;
  top: 2vh;
  left: 2vw;
  right: 2vw;
  bottom: 2vh;
  background: #1a1a4e;
  border: 6px solid #5555cc;
  z-index: 1001;
  max-width: 500px;
  margin: 0 auto;
  flex-direction: column;
}
.lb-header {
  background: #2a2a6e;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 4px solid #5555cc;
}
.lb-header h2 { font-size: 12px; color: #aaf; }
.lb-close {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  background: none;
  border: none;
  color: #888;
  cursor: pointer;
}
.lb-close:hover { color: #fff; }
.lb-body {
  padding: 16px;
  overflow-y: auto;
  flex: 1;
}
.lb-name-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  align-items: center;
  flex-wrap: wrap;
}
.lb-name-row label {
  font-size: 8px;
  color: #aaa;
  white-space: nowrap;
}
.lb-name-row input {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 6px 8px;
  background: #0f0e2e;
  border: 3px solid #5555cc;
  color: #fff;
  flex: 1;
  min-width: 0;
}
.lb-name-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  padding: 6px 10px;
  background: #2a6e2a;
  border: 3px solid #4a4;
  color: #cfc;
  cursor: pointer;
}
.lb-name-btn:hover { background: #3a8e3a; }
.lb-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.lb-actions button {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  padding: 6px 10px;
  border: 3px solid;
  cursor: pointer;
}
.lb-btn-you {
  background: #2a2a6e;
  border-color: #5555cc;
  color: #aaf;
}
.lb-btn-you:hover { background: #3a3a8e; }
.lb-status {
  font-size: 7px;
  color: #666;
  margin-bottom: 8px;
}
.lb-row {
  display: flex;
  padding: 6px 8px;
  font-size: 8px;
  border-bottom: 2px solid #2a2a5e;
  align-items: center;
}
.lb-row-header {
  color: #888;
  font-size: 7px;
  border-bottom: 3px solid #5555cc;
}
.lb-row.you {
  background: #2a2a6e;
  border: 2px solid #5555cc;
}
.lb-row.highlight { animation: lbFlash 1s ease; }
@keyframes lbFlash {
  0%, 100% { background: #2a2a6e; }
  50% { background: #4a4aae; }
}
.lb-rank { width: 40px; color: #ffd700; }
.lb-name-col { flex: 1; color: #e0e0e0; overflow: hidden; text-overflow: ellipsis; }
.lb-score { width: 60px; text-align: right; color: #ff6666; }
.lb-empty {
  font-size: 8px;
  color: #666;
  text-align: center;
  padding: 24px;
}
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>KRÓNU SMELLIR</h1>
    <div id="stats-display"></div>
  </div>
  <div style="text-align:right;display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end">
    <div id="balance-display" style="font-size:16px;color:#fff">0 kr</div>
    <div id="rebirth-display" style="display:flex;align-items:center;gap:6px;font-size:12px;color:#ff6666">
      <div style="width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ff8888,#ff4444 50%,#aa2222);border:2px solid #cc3333;box-shadow:0 0 6px rgba(255,68,68,0.5);display:flex;align-items:center;justify-content:center;font-size:7px;color:#fff;font-family:'Press Start 2P',monospace" id="rebirth-icon">R</div>
      <span id="rebirth-count"></span>
    </div>
    <button id="lb-btn" onclick="openLB()">STIGATAFLA</button>
  </div>
</div>

<div id="game">
  <div id="coin-area">
    <div id="coin" onclick="handleClick(event)">
      <div id="coin-icon"></div>
      <div id="coin-value">1</div>
      <div id="coin-label">kr</div>
    </div>
  </div>
  <div id="click-info"></div>

  <div id="upgrades">
    <div class="panel">
      <div class="panel-title">MYNT UPPFÆRSLA</div>
      <div class="panel-body">
        <div id="coin-upgrade-info"></div>
        <button id="coin-upgrade-btn" class="btn btn-upgrade" onclick="buyCoinUpgrade()"></button>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">SJÁLFVIRKAR TEKJUR</div>
      <div class="panel-body" id="generators-list"></div>
    </div>
    <div id="rebirth-panel" class="panel">
      <div class="panel-title">ENDURFÆÐING</div>
      <div class="panel-body">
        <div id="rebirth-kr-display"></div>
        <div id="rebirth-info"></div>
        <button id="rebirth-btn" class="btn btn-rebirth" onclick="doRebirth()"></button>
      </div>
    </div>
  </div>
</div>

<button id="reset-btn" onclick="resetGame()">RESET</button>
<div id="overlay"></div>
<div id="offline-banner">
  <h2>Velkomin aftur!</h2>
  <p id="offline-text"></p>
  <button onclick="closeOffline()">Takk!</button>
</div>

<div id="lb-overlay" onclick="closeLB()"></div>
<div id="lb-modal">
  <div class="lb-header">
    <h2>STIGATAFLA</h2>
    <button class="lb-close" onclick="closeLB()">X</button>
  </div>
  <div class="lb-body">
    <div class="lb-name-row">
      <label>Nafn:</label>
      <input type="text" id="lb-name-input" maxlength="20" placeholder="Nafnið þitt...">
      <button class="lb-name-btn" onclick="saveLBName()">VISTA</button>
    </div>
    <div class="lb-actions">
      <button class="lb-btn-you" onclick="findMe()">ÞÚ</button>
    </div>
    <div class="lb-status" id="lb-status"></div>
    <div id="lb-table"></div>
  </div>
</div>

<script>
// ── Leaderboard API ──
const LB_URL = 'https://kvdb.io/RgLJofxqbWVpEQkPqfRHUp/leaderboard';

// ── Player ID & Name ──
function getPlayerId() {
  let id = localStorage.getItem('kronuSmellir_playerId');
  if (!id) {
    id = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('kronuSmellir_playerId', id);
  }
  return id;
}
function getPlayerName() { return localStorage.getItem('kronuSmellir_playerName') || ''; }
function setPlayerName(name) { localStorage.setItem('kronuSmellir_playerName', name); }

const lbMyId = getPlayerId();
let lbData = [];

// ── Leaderboard Functions ──
async function submitScore() {
  const name = getPlayerName();
  if (!name) return;
  try {
    const res = await fetch(LB_URL, { headers: { 'Accept': 'application/json' } });
    const data = await res.json();
    data[lbMyId] = { name: name, rebirthKr: state.rebirthKr, lastUpdated: Date.now() };
    await fetch(LB_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(data)
    });
  } catch(e) { console.warn('Score submit failed:', e); }
}

async function fetchLeaderboard() {
  document.getElementById('lb-status').textContent = 'Sækir...';
  try {
    const res = await fetch(LB_URL, { headers: { 'Accept': 'application/json' } });
    const data = await res.json();
    lbData = Object.entries(data).map(([id, entry]) => ({ id, ...entry }));
    lbData.sort((a, b) => b.rebirthKr - a.rebirthKr);
    renderLeaderboard();
    document.getElementById('lb-status').textContent =
      'Uppfært: ' + new Date().toLocaleTimeString('is-IS');
  } catch(e) {
    document.getElementById('lb-status').textContent = 'Villa við að sækja stigatöflu';
  }
}

function renderLeaderboard() {
  const table = document.getElementById('lb-table');
  if (lbData.length === 0) {
    table.innerHTML = '<div class="lb-empty">Engin á stigatöflu enn</div>';
    return;
  }
  let html = '<div class="lb-row lb-row-header"><span class="lb-rank">#</span><span class="lb-name-col">NAFN</span><span class="lb-score">ENDURF.</span></div>';
  lbData.forEach((entry, i) => {
    const isYou = entry.id === lbMyId;
    html += '<div class="lb-row' + (isYou ? ' you' : '') + '" id="lb-entry-' + entry.id + '">' +
      '<span class="lb-rank">' + (i + 1) + '.</span>' +
      '<span class="lb-name-col">' + escapeHtml(entry.name) + (isYou ? ' ←' : '') + '</span>' +
      '<span class="lb-score">' + entry.rebirthKr + '</span>' +
    '</div>';
  });
  table.innerHTML = html;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function openLB() {
  document.getElementById('lb-overlay').style.display = 'block';
  document.getElementById('lb-modal').style.display = 'flex';
  document.getElementById('lb-name-input').value = getPlayerName();
  fetchLeaderboard();
}

function closeLB() {
  document.getElementById('lb-overlay').style.display = 'none';
  document.getElementById('lb-modal').style.display = 'none';
}

function saveLBName() {
  const input = document.getElementById('lb-name-input');
  const name = input.value.trim().slice(0, 20);
  if (!name) return;
  setPlayerName(name);
  submitScore().then(() => fetchLeaderboard());
}

function findMe() {
  const el = document.getElementById('lb-entry-' + lbMyId);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.classList.remove('highlight');
    void el.offsetWidth;
    el.classList.add('highlight');
  }
}

// ── Game State ──
// ── SVG Icons (coin-engraving style) ──
const ICONS = {
  fishSmall: '<svg viewBox="0 0 120 80">' +
    '<path d="M85 40 C85 22 68 10 48 12 C32 14 20 22 15 32 L4 26 C2 24 0 26 2 30 L12 36 C11 38 10 39 10 40 C10 41 11 42 12 44 L2 50 C0 54 2 56 4 54 L15 48 C20 58 32 66 48 68 C68 70 85 58 85 40Z" fill="currentColor"/>' +
    '<path d="M90 40 C92 32 98 24 108 18 L110 20 C102 28 98 34 96 40 C98 46 102 52 110 60 L108 62 C98 56 92 48 90 40Z" fill="currentColor"/>' +
    '<path d="M52 16 C56 8 64 6 70 10 C66 12 60 14 54 18Z" fill="currentColor"/>' +
    '<path d="M50 44 C46 52 40 56 36 52 C38 48 42 46 48 44Z" fill="currentColor"/>' +

const COST_SCALE = 1.15;

const REBIRTH_COST = 10000000000; // 10 billion to rebirth

let state = {
  balance: 0,
  totalEarned: 0,
  coinLevel: 0,
  generators: {},
  rebirthKr: 0,
  lastSave: Date.now(),
};

// Init generator counts
GENERATORS.forEach(g => { state.generators[g.id] = 0; });

// ── Format Numbers ──
function fmt(n) {
  if (n >= 1e12) return (n / 1e12).toFixed(1) + 'T';
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return Math.floor(n).toLocaleString('is-IS');
}

// ── Rebirth multiplier ──
function getRebirthMultiplier() {
  return 1 + state.rebirthKr;
}

function getRebirthCostMultiplier() {
  return Math.pow(1.5, state.rebirthKr);
}

// ── Click ──
function handleClick(e) {
  const clickValue = COIN_LEVELS[state.coinLevel].value * getRebirthMultiplier();
  state.balance += clickValue;
  state.totalEarned += clickValue;
  spawnFloatText(e, clickValue);
  updateUI();
}

function spawnFloatText(e, value) {
  const area = document.getElementById('coin-area');
  const rect = area.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = '+' + fmt(value);
  el.style.left = (e.clientX - rect.left - 20) + 'px';
  el.style.top = (e.clientY - rect.top - 20) + 'px';
  area.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ── Coin Upgrade ──
function getCoinUpgradeCost() {
  if (state.coinLevel >= COIN_LEVELS.length - 1) return Infinity;
  return Math.floor(COIN_LEVELS[state.coinLevel + 1].cost * getRebirthCostMultiplier());
}

function buyCoinUpgrade() {
  const cost = getCoinUpgradeCost();
  if (state.balance < cost || state.coinLevel >= COIN_LEVELS.length - 1) return;
  state.balance -= cost;
  state.coinLevel++;
  updateUI();
}

// ── Generators ──
function getGenCost(gen) {
  const owned = state.generators[gen.id];
  return Math.floor(gen.baseCost * Math.pow(COST_SCALE, owned) * getRebirthCostMultiplier());
}

function buyGenerator(genId) {
  const gen = GENERATORS.find(g => g.id === genId);
  const cost = getGenCost(gen);
  if (state.balance < cost) return;
  state.balance -= cost;
  state.generators[gen.id]++;
  updateUI();
}

function getTotalKps() {
  let total = 0;
  GENERATORS.forEach(g => {
    total += g.baseKps * state.generators[g.id];
  });
  return total * getRebirthMultiplier();
}

// ── Passive Income Loop ──
let lastTick = Date.now();
function tick() {
  const now = Date.now();
  const dt = (now - lastTick) / 1000;
  lastTick = now;
  const earned = getTotalKps() * dt;
  if (earned > 0) {
    state.balance += earned;
    state.totalEarned += earned;
    updateBalanceDisplay();
  }
}

// ── Balance-only update (called by tick, doesn't touch buttons) ──
function updateBalanceDisplay() {
  document.getElementById('balance-display').textContent = fmt(state.balance) + ' kr';
  const rebirthCount = document.getElementById('rebirth-count');
  rebirthCount.textContent = state.rebirthKr + (state.rebirthKr > 0 ? ' (x' + getRebirthMultiplier() + ')' : '');

  const kps = getTotalKps();
  const clickVal = COIN_LEVELS[state.coinLevel].value;
  document.getElementById('stats-display').textContent = clickVal + ' kr/smell  ·  ' + fmt(kps) + ' kr/sek';
  document.getElementById('click-info').textContent = '+' + fmt(clickVal) + ' kr á smell  ·  ' + fmt(kps) + ' kr á sekúndu';

  // Update button enabled/disabled states without rebuilding DOM
  const upgradeBtn = document.getElementById('coin-upgrade-btn');
  if (state.coinLevel < COIN_LEVELS.length - 1) {
    const cost = getCoinUpgradeCost();
    upgradeBtn.className = 'btn btn-upgrade' + (state.balance < cost ? ' disabled' : '');
  }
  GENERATORS.forEach(g => {
    const btn = document.getElementById('gen-btn-' + g.id);
    if (btn) {
      const cost = getGenCost(g);
      btn.className = 'gen-btn' + (state.balance >= cost ? '' : ' disabled');
    }
  });

  // Rebirth button state
  const rebirthBtn = document.getElementById('rebirth-btn');
  if (rebirthBtn) {
    rebirthBtn.className = 'btn btn-rebirth' + (state.totalEarned >= REBIRTH_COST ? '' : ' disabled');
  }
}

// ── Full UI rebuild (called on purchases and init) ──
function updateUI() {
  updateBalanceDisplay();

  // Coin visual
  const level = COIN_LEVELS[state.coinLevel];
  const coinEl = document.getElementById('coin');
  const coinIcon = document.getElementById('coin-icon');
  const coinValue = document.getElementById('coin-value');
  const coinLabel = document.getElementById('coin-label');
  coinValue.textContent = level.value;

  // Switch between coin and paper money at 500kr+
  const billClasses = { 500: 'bill-500', 1000: 'bill-1000', 5000: 'bill-5000', 10000: 'bill-10000' };
  coinEl.className = '';
  if (level.value >= 500) {
    coinEl.classList.add('paper', billClasses[level.value] || 'bill-500');
    coinEl.style.width = '';
    coinEl.style.height = '';
    if (level.img) {
      coinIcon.style.display = '';
      coinIcon.innerHTML = '<img src="' + level.img + '" style="width:100%;height:100%;object-fit:contain;image-rendering:pixelated;pointer-events:none">';
      coinIcon.style.width = '160px';
      coinIcon.style.height = '90px';
      coinIcon.style.marginLeft = (level.offsetX || 0) + 'px';
      coinValue.style.display = 'none';
    } else {
      coinIcon.style.display = 'none';
      coinValue.style.display = '';
    }
    coinLabel.style.display = '';
  } else {
    if (level.color === 'silver') coinEl.classList.add('silver');
    coinIcon.style.display = '';
    var iconSize = level.size * 0.85;
    coinIcon.innerHTML = '<img src="' + level.img + '" style="width:100%;height:100%;object-fit:contain;image-rendering:pixelated;pointer-events:none">';
    coinIcon.style.width = iconSize + 'px';
    coinIcon.style.height = iconSize + 'px';
    coinIcon.style.marginLeft = (level.offsetX || 0) + 'px';
    coinValue.style.display = 'none';
    coinLabel.style.display = 'none';
    coinEl.style.width = level.size + 'px';
    coinEl.style.height = level.size + 'px';
  }

  // Coin upgrade
  const upgradeInfo = document.getElementById('coin-upgrade-info');
  const upgradeBtn = document.getElementById('coin-upgrade-btn');

  if (state.coinLevel >= COIN_LEVELS.length - 1) {
    upgradeInfo.innerHTML = 'Núverandi: <span>' + level.name + '</span><br>Hámarki náð!';
    upgradeBtn.textContent = 'HÁMARKI NÁDD';
    upgradeBtn.className = 'btn btn-upgrade maxed';
  } else {
    const next = COIN_LEVELS[state.coinLevel + 1];
    const cost = getCoinUpgradeCost();
    upgradeInfo.innerHTML =
      'Núverandi: <span>' + level.name + '</span><br>' +
      'Næsta: <span>' + next.name + '</span> (' + next.value + ' kr/smell)<br>' +
      'Verð: <span>' + fmt(cost) + ' kr</span>';
    upgradeBtn.textContent = 'UPPFÆRA → ' + next.name;
    upgradeBtn.className = 'btn btn-upgrade' + (state.balance < cost ? ' disabled' : '');
  }

  // Generators
  const list = document.getElementById('generators-list');
  list.innerHTML = '';
  GENERATORS.forEach(g => {
    const owned = state.generators[g.id];
    const cost = getGenCost(g);
    const canBuy = state.balance >= cost;

    const item = document.createElement('div');
    item.className = 'gen-item';
    item.innerHTML =
      '<div class="gen-info">' +
        '<span class="gen-name">' + g.name + '</span> ' +
        '<span class="gen-owned">(x' + owned + ')</span><br>' +
        '<span class="gen-desc">' + g.desc + ' · ' + g.baseKps + ' kr/s</span>' +
      '</div>' +
      '<button id="gen-btn-' + g.id + '" class="gen-btn' + (canBuy ? '' : ' disabled') + '" onclick="buyGenerator(\'' + g.id + '\')">' +
        fmt(cost) + ' kr' +
      '</button>';
    list.appendChild(item);
  });

  // Rebirth panel
  const mult = getRebirthMultiplier();
  document.getElementById('rebirth-kr-display').innerHTML =
    'Endurfæðingar kr: <span style="color:#ff6666">' + state.rebirthKr + '</span> (x' + mult + ' margfaldari)';
  const canRebirth = state.totalEarned >= REBIRTH_COST;
  document.getElementById('rebirth-info').innerHTML =
    'Þéna ' + fmt(REBIRTH_COST) + ' kr samtals til að endurfæðast.<br>' +
    'Framvinda: <span>' + fmt(state.totalEarned) + ' / ' + fmt(REBIRTH_COST) + '</span><br>' +
    'Þú færð <span>+1 endurfæðingar kr</span> (x' + (mult + 1) + ' margfaldari)';
  const rebirthBtn = document.getElementById('rebirth-btn');
  rebirthBtn.textContent = 'ENDURFÆÐAST';
  rebirthBtn.className = 'btn btn-rebirth' + (canRebirth ? '' : ' disabled');
}

// ── Rebirth ──
function doRebirth() {
  if (state.totalEarned < REBIRTH_COST) return;
  if (!confirm('Ertu viss? Allt nema endurfæðingar kr verður endurstillt!')) return;
  state.rebirthKr++;
  state.balance = 0;
  state.totalEarned = 0;
  state.coinLevel = 0;
  GENERATORS.forEach(g => { state.generators[g.id] = 0; });
  saveGame();
  submitScore();
  updateUI();
}

// ── Reset ──
function resetGame() {
  if (!confirm('Ertu viss? Þetta eyðir ÖLLU - kr, uppfærslum og endurfæðingum!')) return;
  if (!confirm('Alveg 100% viss? Það er engin leið til baka!')) return;
  localStorage.removeItem('kronuSmellir');
  state.balance = 0;
  state.totalEarned = 0;
  state.coinLevel = 0;
  state.rebirthKr = 0;
  GENERATORS.forEach(g => { state.generators[g.id] = 0; });
  saveGame();
  updateUI();
}

// ── Save / Load ──
function saveGame() {
  state.lastSave = Date.now();
  localStorage.setItem('kronuSmellir', JSON.stringify(state));
}

function loadGame() {
  const data = localStorage.getItem('kronuSmellir');
  if (!data) return false;
  try {
    const saved = JSON.parse(data);
    state.balance = saved.balance || 0;
    state.totalEarned = saved.totalEarned || 0;
    state.coinLevel = saved.coinLevel || 0;
    state.rebirthKr = saved.rebirthKr || 0;
    state.lastSave = saved.lastSave || Date.now();
    GENERATORS.forEach(g => {
      state.generators[g.id] = (saved.generators && saved.generators[g.id]) || 0;
    });
    return true;
  } catch (e) {
    return false;
  }
}

function calcOfflineEarnings() {
  const now = Date.now();
  const elapsed = (now - state.lastSave) / 1000;
  const maxOffline = 8 * 60 * 60; // 8 hours
  const seconds = Math.min(elapsed, maxOffline);
  if (seconds < 10) return 0; // ignore tiny gaps
  const earned = getTotalKps() * seconds;
  return Math.floor(earned);
}

function closeOffline() {
  document.getElementById('offline-banner').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
}

// ── Init ──
function init() {
  const hadSave = loadGame();

  if (hadSave) {
    const offline = calcOfflineEarnings();
    if (offline > 0) {
      state.balance += offline;
      state.totalEarned += offline;
      const hours = Math.floor((Date.now() - state.lastSave) / 3600000);
      const mins = Math.floor(((Date.now() - state.lastSave) % 3600000) / 60000);
      let timeStr = '';
      if (hours > 0) timeStr += hours + ' klst ';
      timeStr += mins + ' mín';
      document.getElementById('offline-text').innerHTML =
        'Þú varst í burtu í ' + timeStr + '.<br><br>' +
        'Þú þénaðir <span style="color:#ffd700">' + fmt(offline) + ' kr</span> á meðan!';
      document.getElementById('offline-banner').style.display = 'block';
      document.getElementById('overlay').style.display = 'block';
    }
  }

  updateUI();

  // Game loop
  setInterval(tick, 100);

  // Auto-save every 30s
  setInterval(saveGame, 30000);

  // Save on close
  window.addEventListener('beforeunload', saveGame);

  // Leaderboard: submit score on load and auto-refresh every 5 minutes
  submitScore();
  setInterval(() => {
    submitScore();
    if (document.getElementById('lb-modal').style.display === 'flex') {
      fetchLeaderboard();
    }
  }, 5 * 60 * 1000);
}



init();
</script>
</body>
</html>
